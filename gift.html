<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>امجااااااااد</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffdce8, #e7dcff);
    }

    .card {
      width: 430px;
      min-height: 380px;
      background: white;
      border-radius: 30px;
      padding: 35px;
      text-align: center;
      position: relative;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
      z-index: 5;
    }

    .title {
      font-size: 38px;
      color: #ff4f8b;
      margin-top: 10px;
      margin-bottom: 35px;
      animation: floatText 1.5s infinite ease-in-out;
    }

    @keyframes floatText {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    .small-text {
      color: #555;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 25px;
    }

    .instruction {
      color: #666;
      font-size: 20px;
      margin-bottom: 30px;
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 14px 28px;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
    }

    #runBtn {
      background: black;
      color: white;
      position: absolute;
      top: 270px;
      left: 110px;
    }

    #realBtn {
      display: none;
      background: #ff4f8b;
      color: white;
      margin-top: 20px;
      animation: pop 0.5s ease;
    }

    @keyframes pop {
      0% { transform: scale(0); }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    #finalBox {
      display: none;
      margin-top: 20px;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0px); }
    }

    .finalText {
      color: #ff4f8b;
      font-size: 30px;
      font-weight: bold;
      margin-bottom: 18px;
    }

    .subText {
      color: #666;
      font-size: 24px;
      margin-bottom: 30px;
    }

    .choiceBtns {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    #forgiveBtn {
      background: #ff4f8b;
      color: white;
    }

    #angryBtn {
      background: black;
      color: white;
    }

    #celebrationText {
      display: none;
      margin-top: 25px;
      color: #ff4f8b;
      font-size: 28px;
      font-weight: bold;
      animation: pop 0.7s ease;
    }

    #extraText {
      display: none;
      margin-top: 12px;
      color: #777;
      font-size: 18px;
      animation: fadeIn 1s ease;
    }

    .heart,
    .flower {
      position: fixed;
      bottom: -40px;
      font-size: 28px;
      pointer-events: none;
      z-index: 10;
      animation: flyUp 4s linear forwards;
    }

    @keyframes flyUp {
      0% {
        transform: translateY(0) scale(0.8) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: translateY(-110vh) scale(1.6) rotate(360deg);
        opacity: 0;
      }
    }

    .roseBurst {
      position: fixed;
      left: 50%;
      top: 50%;
      font-size: 120px;
      transform: translate(-50%, -50%) scale(0);
      pointer-events: none;
      z-index: 9999;
      animation: roseBloom 1.5s ease forwards;
    }

    .petal {
      position: fixed;
      left: 50%;
      top: 50%;
      font-size: 35px;
      pointer-events: none;
      z-index: 9998;
      animation: petalFly 1.8s ease-out forwards;
    }

    @keyframes roseBloom {
      0% {
        transform: translate(-50%, -50%) scale(0) rotate(-25deg);
        opacity: 0;
      }

      35% {
        transform: translate(-50%, -50%) scale(1.3) rotate(10deg);
        opacity: 1;
      }

      65% {
        transform: translate(-50%, -50%) scale(1) rotate(-5deg);
        opacity: 1;
      }

      100% {
        transform: translate(-50%, -50%) scale(1.6) rotate(20deg);
        opacity: 0;
      }
    }

    @keyframes petalFly {
      0% {
        transform: translate(-50%, -50%) scale(0.5) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: translate(calc(-50% + var(--x)), calc(-50% + var(--y))) scale(1.4) rotate(720deg);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <div class="card">

    <div id="firstScene">

      <h1 class="title">
        تم تخليص الجامعه هاه؟؟
      </h1>

      <div class="small-text">
        عندي حلك كلمتين صبري
      </div>

      <div class="instruction">
        ضغطي على الزر
      </div>

      <button id="runBtn">
        ضغطي هنا
      </button>

      <button id="realBtn">
        هنا والله
      </button>

    </div>

    <div id="finalBox">

      <div class="finalText">
        كل عام وانت بخير امجاد
      </div>

      <div class="subText">
        وعاد عيدش
      </div>

      <div class="subText">
        تبي تنتقمي؟
      </div>

      <div class="choiceBtns">

        <button id="angryBtn">
          لا اسامحك
        </button>

        <button id="forgiveBtn">
          الموافقه
        </button>

      </div>

      <div id="celebrationText">
        ححححححححححححي &lt;3
      </div>

      <div id="extraText">
        يمديش ترا تضغطي عليه اكثر وجربي مو يستوي
      </div>

    </div>

  </div>

  <script>

    const runBtn = document.getElementById("runBtn");
    const realBtn = document.getElementById("realBtn");

    const forgiveBtn = document.getElementById("forgiveBtn");
    const angryBtn = document.getElementById("angryBtn");

    const celebrationText = document.getElementById("celebrationText");
    const extraText = document.getElementById("extraText");

    const firstScene = document.getElementById("firstScene");
    const finalBox = document.getElementById("finalBox");

    const texts = [
      "ويو خدغتش",
      "بعدك تحاولي ؟",
      "خلاص استسلمي",
      "اوكي اخر مره",
      "روحي ضغطي",
      "الحين بيطلع"
    ];

    let index = 0;

    function moveButton() {

      if (index < texts.length) {
        runBtn.textContent = texts[index];
        index++;
      }

      if (index === texts.length) {
        runBtn.style.display = "none";
        realBtn.style.display = "inline-block";
        return;
      }

      const randomX =
        Math.random() *
        (window.innerWidth - runBtn.offsetWidth - 20);

      const randomY =
        Math.random() *
        (window.innerHeight - runBtn.offsetHeight - 20);

      runBtn.style.position = "fixed";
      runBtn.style.left = randomX + "px";
      runBtn.style.top = randomY + "px";
    }

    runBtn.addEventListener("mouseover", moveButton);
    runBtn.addEventListener("click", moveButton);

    realBtn.addEventListener("click", () => {
      firstScene.style.display = "none";
      finalBox.style.display = "block";
    });

    const revengeTexts = [
      "وييل عجبني انتقامش",
      " تعاندي هاه",
      "يالله خذي راحتش",
      "تعادلنا تو اعتقد",
      "هههههههههههه",
      "خلاص خلصت",
      "اول موقع اسويه"
    ];

    let revengeIndex = 0;

    function moveForgiveButton() {

      if (revengeIndex < revengeTexts.length) {
        forgiveBtn.textContent = revengeTexts[revengeIndex];
        revengeIndex++;
      }

      const randomX =
        Math.random() *
        (window.innerWidth - forgiveBtn.offsetWidth - 20);

      const randomY =
        Math.random() *
        (window.innerHeight - forgiveBtn.offsetHeight - 20);

      forgiveBtn.style.position = "fixed";
      forgiveBtn.style.left = randomX + "px";
      forgiveBtn.style.top = randomY + "px";
    }

    forgiveBtn.addEventListener("mouseover", moveForgiveButton);
    forgiveBtn.addEventListener("click", moveForgiveButton);

    let angryClicks = 0;

    angryBtn.addEventListener("click", () => {

      angryClicks++;

      celebrationText.style.display = "block";
      extraText.style.display = "block";

      for (let i = 0; i < 55; i++) {
        createFloatingItem();
      }

      if (angryClicks >= 3) {
        createRoseBurst();
      }

    });

    function createFloatingItem() {

      const item = document.createElement("div");

      const items = ["♡", "♥", "❀", "✿"];

      item.textContent =
        items[Math.floor(Math.random() * items.length)];

      item.className =
        Math.random() > 0.5 ? "heart" : "flower";

      item.style.left =
        Math.random() * 100 + "vw";

      item.style.fontSize =
        (22 + Math.random() * 28) + "px";

      item.style.animationDuration =
        (3 + Math.random() * 3) + "s";

      document.body.appendChild(item);

      setTimeout(() => {
        item.remove();
      }, 6000);
    }

    function createRoseBurst() {

      const rose = document.createElement("div");

      rose.className = "roseBurst";
      rose.textContent = "🌹";

      document.body.appendChild(rose);

      for (let i = 0; i < 22; i++) {
        const petal = document.createElement("div");

        petal.className = "petal";
        petal.textContent = i % 2 === 0 ? "🌸" : "🌹";

        const angle = Math.random() * Math.PI * 2;
        const distance = 120 + Math.random() * 220;

        const x = Math.cos(angle) * distance + "px";
        const y = Math.sin(angle) * distance + "px";

        petal.style.setProperty("--x", x);
        petal.style.setProperty("--y", y);

        petal.style.fontSize = (24 + Math.random() * 28) + "px";

        document.body.appendChild(petal);

        setTimeout(() => {
          petal.remove();
        }, 1800);
      }

      setTimeout(() => {
        rose.remove();
      }, 1500);
    }

  </script>

</body>

</html>
